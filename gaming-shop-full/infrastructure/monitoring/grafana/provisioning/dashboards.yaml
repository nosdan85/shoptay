# Grafana Provisioning Configuration

apiVersion: 1

providers:
  - name: 'Nos Market Dashboards'
    orgId: 1
    folder: 'Nos Market'
    folderUid: 'nosmarket'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
