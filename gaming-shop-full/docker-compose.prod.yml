version: "3.9"

# ============================================
# Nos Market - Production Stack
# ============================================
# This docker-compose is for production deployment
# Usage: docker-compose -f docker-compose.yml up -d

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nosmarket}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nosmarket
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nosmarket}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      - nosmarket
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ============================================
  # API Service
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        - NODE_ENV=production
    image: nosmarket/api:latest
    container_name: nosmarket-api
    expose:
      - "3001"
    ports:
      - "${API_PORT:-127.0.0.1:3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      # Auth
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      # Discord
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - OWNER_DISCORD_ID=${OWNER_DISCORD_ID}
      # PayPal
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - PAYPAL_MODE=${PAYPAL_MODE:-live}
      # Square
      - SQUARE_APPLICATION_ID=${SQUARE_APPLICATION_ID}
      - SQUARE_ACCESS_TOKEN=${SQUARE_ACCESS_TOKEN}
      - SQUARE_ENVIRONMENT=${SQUARE_ENVIRONMENT:-production}
      # Crypto
      - NOWPAYMENTS_API_KEY=${NOWPAYMENTS_API_KEY}
      - NOWPAYMENTS_IPN_KEY=${NOWPAYMENTS_IPN_KEY}
      # URLs
      - BASE_URL=${BASE_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - API_URL=${API_URL}
      # Security
      - FRAUD_BLOCK_THRESHOLD=${FRAUD_BLOCK_THRESHOLD:-80}
      - FRAUD_WARN_THRESHOLD=${FRAUD_WARN_THRESHOLD:-50}
      - CORS_ORIGINS=${CORS_ORIGINS}
      # Rate Limiting
      - THROTTLE_TTL=60000
      - THROTTLE_LIMIT=100
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nosmarket
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # Web Frontend (Next.js)
  # ============================================
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - NODE_ENV=production
    image: nosmarket/web:latest
    container_name: nosmarket-web
    expose:
      - "3000"
    ports:
      - "${WEB_PORT:-127.0.0.1:3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${API_URL}
      - NEXT_PUBLIC_APP_URL=${FRONTEND_URL}
      - NEXT_PUBLIC_DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - NEXT_PUBLIC_DISCORD_INVITE_URL=${DISCORD_INVITE_URL}
      - NEXT_PUBLIC_DISCORD_VOUCH_URL=${DISCORD_VOUCH_URL}
      - NEXT_PUBLIC_SITE_LOGO=/site-logo.png
    depends_on:
      - api
    networks:
      - nosmarket
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # Discord Bot
  # ============================================
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
      args:
        - NODE_ENV=production
    image: nosmarket/bot:latest
    container_name: nosmarket-bot
    environment:
      - NODE_ENV=production
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - API_BASE_URL=http://api:3001
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_VOUCH_CHANNEL_ID=${DISCORD_VOUCH_CHANNEL_ID}
      - OWNER_DISCORD_ID=${OWNER_DISCORD_ID}
      - OWNER_ROLE_ID=${OWNER_ROLE_ID}
      - TICKET_CATEGORY_ID=${TICKET_CATEGORY_ID}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - nosmarket
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # Nginx Reverse Proxy & Load Balancer
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nosmarket-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
    depends_on:
      - web
      - api
    networks:
      - nosmarket
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Prometheus Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: nosmarket-prometheus
    ports:
      - "${PROMETHEUS_PORT:-127.0.0.1:9090}:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - nosmarket
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================
  # Grafana Dashboards & Visualization
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: nosmarket-grafana
    ports:
      - "${GRAFANA_PORT:-127.0.0.1:3002}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-%(protocol)s://%(domain)s:%(http_port)s/grafana}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - nosmarket
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  nginx_logs:
    driver: local
  nginx_cache:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  nosmarket:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
