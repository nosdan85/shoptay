# SSL Configuration for nginx
# Generated SSL parameters - replace with your actual certificates

# Certificate paths
ssl_certificate /etc/nginx/ssl/cert.pem;
ssl_certificate_key /etc/nginx/ssl/key.pem;
ssl_trusted_certificate /etc/nginx/ssl/ca.pem;

# Diffie-Hellman parameter for DHE key exchange
ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# SSL Protocol versions (TLSv1.2 and TLSv1.3 only - no SSL)
ssl_protocols TLSv1.2 TLSv1.3;

# Modern cipher suite - ECDHE for forward secrecy
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

# Disable server cipher preference (client determines cipher order)
ssl_prefer_server_ciphers off;

# ECC curve for key exchange
ssl_ecdh_curve secp384r1;

# Session cache - shared between workers
ssl_session_cache shared:SSL:50m;
ssl_session_tickets off;
ssl_session_timeout 1d;

# OCSP Stapling
ssl_stapling on;
ssl_stapling_verify on;

# DNS resolver for OCSP
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# Security headers (can also be set in server blocks)
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
# add_header X-Frame-Options SAMEORIGIN always;
# add_header X-Content-Type-Options nosniff always;
