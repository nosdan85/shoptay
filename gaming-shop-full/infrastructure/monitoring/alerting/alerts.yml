groups:
  - name: nosmarket_api_alerts
    interval: 30s
    rules:
      # High API error rate
      - alert: APIHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "High API error rate detected"
          description: "API error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          runbook_url: "https://docs.nosdan.store/runbooks/high-error-rate"

      # API response time p95
      - alert: APISlowResponseTime
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "API response time degradation"
          description: "API p95 response time is {{ $value | humanizeDuration }} (threshold: 2s)"
          runbook_url: "https://docs.nosdan.store/runbooks/slow-response"

      # API down
      - alert: APIServiceDown
        expr: up{job="nosmarket-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "API service is down"
          description: "The API service has been unreachable for more than 1 minute"
          runbook_url: "https://docs.nosdan.store/runbooks/service-down"

      # High API latency
      - alert: APIHighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job="nosmarket-api"}[5m])) by (le)
          ) > 5
        for: 5m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "API p99 latency critical"
          description: "API p99 latency is {{ $value | humanizeDuration }} (threshold: 5s)"
          runbook_url: "https://docs.nosdan.store/runbooks/high-latency"

  - name: nosmarket_database_alerts
    interval: 30s
    rules:
      # Database connections high
      - alert: DatabaseConnectionsHigh
        expr: |
          pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Database connection pool near capacity"
          description: "Database connections at {{ $value | humanizePercentage }} of max"
          runbook_url: "https://docs.nosdan.store/runbooks/db-connections"

      # Database slow queries
      - alert: DatabaseSlowQueries
        expr: |
          sum(rate(pg_stat_statements_mean_exec_time[5m])) by (datname) > 1000
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "High number of slow database queries"
          description: "Database has many slow queries ({{ $value | humanizeDuration }} mean)"
          runbook_url: "https://docs.nosdan.store/runbooks/slow-queries"

      # Database replication lag (if applicable)
      - alert: DatabaseReplicationLag
        expr: |
          pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "Database replication lag detected"
          description: "Replication lag is {{ $value | humanizeDuration }}"
          runbook_url: "https://docs.nosdan.store/runbooks/replication-lag"

  - name: nosmarket_redis_alerts
    interval: 30s
    rules:
      # Redis memory high
      - alert: RedisMemoryHigh
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory at {{ $value | humanizePercentage }} of max"
          runbook_url: "https://docs.nosdan.store/runbooks/redis-memory"

      # Redis OOM
      - alert: RedisOutOfMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.95
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis out of memory imminent"
          description: "Redis memory at {{ $value | humanizePercentage }} of max"
          runbook_url: "https://docs.nosdan.store/runbooks/redis-oom"

      # Redis connections high
      - alert: RedisConnectionsHigh
        expr: redis_connected_clients > 1000
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis connections high"
          description: "Redis has {{ $value }} connected clients"
          runbook_url: "https://docs.nosdan.store/runbooks/redis-connections"

      # Redis down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable for 1 minute"
          runbook_url: "https://docs.nosdan.store/runbooks/redis-down"

  - name: nosmarket_bot_alerts
    interval: 30s
    rules:
      # Discord bot offline
      - alert: DiscordBotOffline
        expr: up{job="nosmarket-bot"} == 0
        for: 2m
        labels:
          severity: critical
          service: bot
        annotations:
          summary: "Discord bot is offline"
          description: "The Discord bot has been offline for more than 2 minutes"
          runbook_url: "https://docs.nosdan.store/runbooks/bot-offline"

      # Discord API errors
      - alert: DiscordAPIErrorRateHigh
        expr: |
          (
            sum(rate(discord_api_errors_total[5m])) by (service)
            /
            sum(rate(discord_api_requests_total[5m])) by (service)
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          service: bot
        annotations:
          summary: "High Discord API error rate"
          description: "Discord API error rate is {{ $value | humanizePercentage }}"
          runbook_url: "https://docs.nosdan.store/runbooks/discord-errors"

  - name: nosmarket_web_alerts
    interval: 30s
    rules:
      # Web service down
      - alert: WebServiceDown
        expr: up{job="nosmarket-web"} == 0
        for: 2m
        labels:
          severity: warning
          service: web
        annotations:
          summary: "Web service is down"
          description: "The Next.js web service has been unreachable"
          runbook_url: "https://docs.nosdan.store/runbooks/web-down"

  - name: nosmarket_infrastructure_alerts
    interval: 60s
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: |
          sum(rate(container_cpu_usage_seconds_total[5m])) by (container_label_app) > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "Container {{ $labels.container_label_app }} CPU at {{ $value | humanizePercentage }}"

      # High memory usage
      - alert: HighMemoryUsage
        expr: |
          container_memory_usage_bytes / container_memory_limit_bytes > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Container {{ $labels.container_label_app }} memory at {{ $value | humanizePercentage }}"

      # Disk space low
      - alert: DiskSpaceLow
        expr: |
          node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.15
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space running low"
          description: "Disk space at {{ $value | humanizePercentage }} available"

      # Container restart loop
      - alert: ContainerRestartingTooMuch
        expr: |
          increase(container_restart_count[1h]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container restarting frequently"
          description: "Container {{ $labels.container_label_app }} has restarted {{ $value }} times in the last hour"

  - name: nosmarket_business_alerts
    interval: 5m
    rules:
      # No orders in a while
      - alert: NoOrdersReceived
        expr: |
          increase(orders_created_total[30m]) == 0
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "No new orders in 30 minutes"
          description: "No orders have been created in the last 30 minutes. This may indicate a checkout issue."

      # Payment failures spike
      - alert: PaymentFailuresSpike
        expr: |
          (
            sum(rate(payment_attempts_total{status="failed"}[5m])) by (method)
            /
            sum(rate(payment_attempts_total[5m])) by (method)
          ) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Payment failure rate spike"
          description: "Payment method {{ $labels.method }} has {{ $value | humanizePercentage }} failure rate"

      # High checkout abandonment
      - alert: HighCheckoutAbandonment
        expr: |
          (
            sum(rate(checkout_started_total[15m]))
            -
            sum(rate(orders_created_total[15m]))
          ) / sum(rate(checkout_started_total[15m])) > 0.8
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High checkout abandonment rate"
          description: "Checkout abandonment rate is {{ $value | humanizePercentage }}"
